# docker-compose.yml — local n8n stack (Phase 2 task 2.4 FULL)
# ---------------------------------------------------------------------
# Full-feature form. Bootstrapped at task 2.0b.pre; expanded here at
# task 2.4 post-spike per design plan §3.2 and CONTEXT.md §7.4.
#
# Features:
#   - n8n at localhost:5678 with basic auth
#   - Persistent workflow data volume at ./n8n/n8n-data
#   - Test-case docs mounted at /files (read-only) for Form Trigger uploads
#   - Community nodes auto-installed on first startup:
#     * rorubyy/n8n-nodes-openai-langfuse (Langfuse tracing)
#     * @langfuse/n8n-nodes-langfuse (Langfuse Prompt Management)
#     Names per design plan §2.12; verify at Phase 3 task 3.24.
#   - NODE_FUNCTION_ALLOW_EXTERNAL=ajv retained for outside-sandbox
#     scripts that docker-compose-exec in. Inside-Code-node schema
#     validation uses code/json-schema-validator.js per D-3 / P-1.
#
# On first startup after expanding this file from bootstrap:
#   docker compose down && docker compose up -d
#   (community packages install on fresh container start)
# ---------------------------------------------------------------------

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: deal-diligence-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # Host + auth
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Toronto}
      # Code node external module allowlist. Kept for outside-sandbox scripts
      # that docker-compose-exec in; inside the Code node, ajv.compile() is
      # blocked by the VM sandbox (see P-1 in pitfalls.md / D-3 in decisions.md).
      # Inside-sandbox schema validation uses code/json-schema-validator.js.
      NODE_FUNCTION_ALLOW_EXTERNAL: "ajv"

      # Community nodes installed automatically on first startup.
      # Names per design plan §2.12. Verify at Phase 3 task 3.24 — if a
      # package name is wrong, update here and restart.
      N8N_COMMUNITY_PACKAGES: "rorubyy/n8n-nodes-openai-langfuse,@langfuse/n8n-nodes-langfuse"
      # Surface secrets we need inside workflow HTTP Request / credentials
      # (n8n nodes read these via ${{ $env.VAR_NAME }} expressions)
      ALICLOUD_API_KEY: ${ALICLOUD_API_KEY}
      ALICLOUD_BASE_URL: ${ALICLOUD_BASE_URL}
      ALICLOUD_MODEL: ${ALICLOUD_MODEL}
      ALICLOUD_EMBEDDING_MODEL: ${ALICLOUD_EMBEDDING_MODEL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    volumes:
      - ./n8n/n8n-data:/home/node/.n8n
      - ./test-cases:/files:ro
