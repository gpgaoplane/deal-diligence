# docker-compose.yml — local n8n stack (Phase 2 task 2.4 FULL)
# ---------------------------------------------------------------------
# Full-feature form. Bootstrapped at task 2.0b.pre; expanded here at
# task 2.4 post-spike per design plan §3.2 and CONTEXT.md §7.4.
#
# Features:
#   - n8n at localhost:5678 with basic auth
#   - Persistent workflow data volume at ./n8n/n8n-data
#   - Test-case docs mounted at /files (read-only) for Form Trigger uploads
#   - NODE_FUNCTION_ALLOW_EXTERNAL=ajv retained for outside-sandbox
#     scripts that docker-compose-exec in. Inside-Code-node schema
#     validation uses code/json-schema-validator.js per D-3 / P-1.
#
# Community nodes (Langfuse):
#   Install via UI: Settings → Community Nodes → Install.
#     - @langfuse/n8n-nodes-langfuse    (Prompt Management)
#     - n8n-nodes-openai-langfuse       (tracing)
#   n8n 2.17.7 does not honor N8N_COMMUNITY_PACKAGES env var (verified
#   empirically 2026-04-24; see docs/agents/claude.md Phase 2 closure
#   entry). Installations persist in ./n8n/n8n-data/.
# ---------------------------------------------------------------------

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: deal-diligence-n8n
    restart: unless-stopped
    # Note: previously had `user: "0:0"` here as a speculative fix for
    # the "Write Memo File is not writable" error. Removed after the
    # systematic-debugging pass identified the actual root cause:
    # n8n 2.x's `restrictFileAccessTo` security default (gate #3 in
    # `isFilePathBlocked`) blocks writes outside `~/.n8n-files`. The
    # real fix is `N8N_RESTRICT_FILE_ACCESS_TO=/home/node/outputs`
    # (set below in environment). Running as root was unnecessary;
    # default user `node` (uid 1000) writes fine once the allowlist
    # is configured. See P-7 in `.claude/memory/pitfalls.md`.
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # Host + auth
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Toronto}
      # Code node external module allowlist. Kept for outside-sandbox scripts
      # that docker-compose-exec in; inside the Code node, ajv.compile() is
      # blocked by the VM sandbox (see P-1 in pitfalls.md / D-3 in decisions.md).
      # Inside-sandbox schema validation uses code/json-schema-validator.js.
      NODE_FUNCTION_ALLOW_EXTERNAL: "ajv"

      # NOTE: Community nodes are installed via the n8n UI, not via env var.
      # N8N_COMMUNITY_PACKAGES was attempted but is not processed by
      # n8n 2.17.7 (no log entry, no install attempt). UI install path:
      #   Settings → Community Nodes → Install a community node
      # Install these two packages (verified on npm registry 2026-04-24):
      #   - @langfuse/n8n-nodes-langfuse    (Langfuse Prompt Management)
      #   - n8n-nodes-openai-langfuse       (Langfuse tracing; unscoped)
      # Installation persists in ./n8n/n8n-data/ (bind-mounted volume) and
      # survives container restarts. See Phase 3 task 3.24.

      # Allow workflow expressions to read container env vars via {{ $env.* }}.
      # Default in n8n 2.x is to BLOCK env access in expressions for security.
      # For this local-dev prototype we open it so HTTP Request nodes can read
      # ALICLOUD_API_KEY etc. from .env without needing UI-managed Credentials.
      # Production deployment would use n8n Credentials instead.
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"

      # Allow the Read/Write File node to write outside n8n's user data dir.
      # Default in n8n is to BLOCK access to anything under the n8n user
      # folder (~/.n8n and surrounding tree) for security. This is gate #1
      # of three in n8n's `isFilePathBlocked`. Setting to false skips it.
      N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES: "false"

      # ***CRITICAL — gate #3 of three in n8n's isFilePathBlocked***
      # n8n 2.x ALSO restricts file writes to an explicit allowlist via
      # `restrictFileAccessTo`. The DEFAULT value is `~/.n8n-files` (resolves
      # to /root/.n8n-files for the root user, /home/node/.n8n-files for
      # the node user). When non-empty, this becomes a hard allowlist —
      # `isFilePathBlocked` returns true for any path NOT inside an allowed
      # path, even if disk permissions would otherwise allow the write.
      # This is what produces the misleading "The file ... is not writable"
      # error from n8n-core/.../file-system-helper-functions.js for our
      # /home/node/outputs/<filename>.md target.
      #
      # We allowlist /home/node/outputs (the bind-mount target) so the
      # Write Memo File node can write there. Production deployments
      # would set this to a tighter allowlist of expected output paths.
      N8N_RESTRICT_FILE_ACCESS_TO: "/home/node/outputs"
      # Surface secrets we need inside workflow HTTP Request / credentials
      # (n8n nodes read these via ${{ $env.VAR_NAME }} expressions)
      ALICLOUD_API_KEY: ${ALICLOUD_API_KEY}
      ALICLOUD_BASE_URL: ${ALICLOUD_BASE_URL}
      ALICLOUD_MODEL: ${ALICLOUD_MODEL}
      # Embeddings provider (OpenRouter by default; swappable via env only).
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      # Both names are forwarded for env-var convention robustness.
      # The Build Langfuse Batch node tries LANGFUSE_BASE_URL first
      # (n8n / docker-compose default convention), then LANGFUSE_HOST
      # (Langfuse Python SDK convention). Setting either in .env works.
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL}
      LANGFUSE_HOST: ${LANGFUSE_HOST}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    volumes:
      - ./n8n/n8n-data:/home/node/.n8n
      - ./test-cases:/files:ro
      # Generated memo outputs — n8n writes one Markdown file per run here
      # via the "Write Memo File" node (Phase 6 enhancement). Read-write so
      # the workflow can create files; visible on the host at ./outputs/.
      # Mounted under /home/node/ (the container user's home directory)
      # rather than /outputs so the n8n process (running as uid 1000)
      # has write permission. Mounting at /outputs causes "not writable"
      # errors on Windows + Docker Desktop because bind mounts to Windows
      # host paths don't always grant write to non-root container users.
      - ./outputs:/home/node/outputs
